name: LaTeX 自动化编译测试 (不发布线上)

on:
  push:
    branches: test-latex-build

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 编译 LaTeX 生成 PDF
        uses: xu-cheng/latex-action@v3
        env:
          TEXINPUTS: ".:..:"
        with:
          working_directory: CCBook/pdf_export
          root_file: |
            export_toc.tex
            export_chapter_intro.tex
            export_chapter_1.tex
            export_chapter_2.tex
            export_chapter_3.tex
            export_chapter_4.tex
            export_chapter_5.tex
            export_chapter_6.tex
          compiler: xelatex

      - name: 安装优化工具
        run: sudo apt-get update && sudo apt-get install -y ghostscript qpdf

      - name: 批量优化所有生成的 PDF
        run: |
          cd CCBook/pdf_export
          
          mkdir -p ../../test_output_pdfs
          
          for file in *.pdf; do
            echo "正在优化: $file"
            gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.4 -dPDFSETTINGS=/ebook -dNOPAUSE -dQUIET -dBATCH -sOutputFile=temp.pdf "$file"
            
            qpdf --linearize temp.pdf "../../test_output_pdfs/$file" 
            rm temp.pdf
          done

      - name: 安装 Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 渲染网页 (Render Only)
        run: quarto render

      - name: 上传网站产物与新生成的 PDF (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: test-website-and-pdfs
          path: |
            _site/
            test_output_pdfs/